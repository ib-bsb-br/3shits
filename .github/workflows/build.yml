name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
            rpm_arch: x86_64
          - arch: arm64
            os: ubuntu-24.04-arm
            rpm_arch: aarch64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          path: _build/_deps
          key: ${{ runner.os }}-${{ matrix.arch }}-cmake-03-build-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cmake-03-build-

      - name: Install system dependencies
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo apt-get -o Acquire::Retries=3 install \
            mesa-common-dev libgl1-mesa-dev libgl1 libglx-mesa0 libxext-dev \
            libgtk-3-dev libunwind-dev squashfs-tools ruby ruby-dev build-essential
          sudo gem install --no-document --verbose fpm

      - name: Configure CMake
        run: |
          cmake -S . -B _build \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCPACK_PACKAGING_INSTALL_PREFIX=/usr \
            -DCMAKE_BUILD_TYPE=Release \
            -DwxBUILD_SHARED=OFF \
            -DwxBUILD_INSTALL=OFF \
            -DwxUSE_REGEX=builtin \
            -DwxUSE_ZLIB=builtin \
            -DwxUSE_EXPAT=builtin \
            -DwxUSE_LIBJPEG=builtin \
            -DwxUSE_LIBPNG=builtin \
            -DwxUSE_LIBTIFF=builtin \
            -DwxUSE_NANOSVG=builtin \
            -DTREESHEETS_VERSION=${{ github.run_number }}

      - name: Build and package TreeSheets
        run: cmake --build _build --target package -j4

      - name: Normalize DEB filenames
        run: |
          shopt -s extglob nullglob
          for file in _build/treesheets_*:*.deb; do
            mv -v "${file}" "${file/_+([[:digit:]]):/_}"
          done

      - name: Convert DEB packages to RPM
        run: |
          shopt -s nullglob
          for file in _build/*.deb; do
            fpm -s deb -t rpm -a "${{ matrix.rpm_arch }}" --no-depends --package _build --name treesheets "${file}"
          done

      - name: Create release
        if: github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.run_number }}
          allowUpdates: true
          omitBody: true
          commit: ${{ github.sha }}
          artifacts: _build/treesheets_*.deb,_build/treesheets-*.rpm

      - name: Upload artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds-${{ matrix.arch }}
          path: |
            _build/treesheets_*.deb
            _build/treesheets-*.rpm

      - name: Remove generated artifacts
        run: rm -f _build/treesheets_*.deb _build/treesheets-*.rpm
